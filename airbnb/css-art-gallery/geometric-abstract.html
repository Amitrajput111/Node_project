<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Abstract Art - CSS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .artwork {
            width: 900px;
            height: 700px;
            position: relative;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            border-radius: 15px;
            box-shadow: 
                0 0 60px rgba(255, 0, 150, 0.3),
                0 0 120px rgba(0, 255, 255, 0.2);
            overflow: hidden;
        }

        /* Grid Pattern Background */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* Large Geometric Shapes */
        .shape-large {
            position: absolute;
            filter: blur(1px);
        }

        .hexagon {
            width: 200px;
            height: 173px;
            background: linear-gradient(135deg, #ff0080, #ff8c00);
            position: relative;
            top: 150px;
            left: 100px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            animation: rotateHex 15s linear infinite;
            opacity: 0.8;
        }

        .diamond {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #00ffff, #0080ff);
            transform: rotate(45deg);
            top: 300px;
            right: 120px;
            animation: pulseDiamond 8s ease-in-out infinite;
            opacity: 0.7;
        }

        .triangle-large {
            width: 0;
            height: 0;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-bottom: 200px solid #ff4081;
            top: 80px;
            right: 200px;
            animation: triangleFloat 12s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(255, 64, 129, 0.5));
        }

        /* Medium Shapes */
        .shape-medium {
            position: absolute;
            opacity: 0.6;
        }

        .circle-1 {
            width: 100px;
            height: 100px;
            background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #ff6b6b);
            border-radius: 50%;
            top: 200px;
            left: 300px;
            animation: spinCircle 6s linear infinite;
        }

        .circle-2 {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd93d, #ff6b35);
            border-radius: 50%;
            bottom: 150px;
            left: 200px;
            animation: bounce 4s ease-in-out infinite;
        }

        .square-1 {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: rotate(15deg);
            top: 400px;
            left: 450px;
            animation: squareWobble 7s ease-in-out infinite;
        }

        /* Small Decorative Elements */
        .shape-small {
            position: absolute;
            opacity: 0.5;
        }

        .dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .dot-1 { background: #ff0080; top: 120px; left: 200px; animation-delay: 0s; }
        .dot-2 { background: #00ffff; top: 180px; left: 600px; animation-delay: 1s; }
        .dot-3 { background: #ffff00; top: 350px; left: 150px; animation-delay: 2s; }
        .dot-4 { background: #ff4081; bottom: 200px; right: 180px; animation-delay: 0.5s; }
        .dot-5 { background: #00ff80; bottom: 300px; left: 350px; animation-delay: 1.5s; }

        .line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            animation: lineSlide 5s ease-in-out infinite;
        }

        .line-1 {
            width: 200px;
            top: 250px;
            left: 100px;
            transform: rotate(25deg);
            animation-delay: 0s;
        }

        .line-2 {
            width: 150px;
            bottom: 180px;
            right: 150px;
            transform: rotate(-30deg);
            animation-delay: 2s;
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .particle-1 { top: 100px; left: 150px; animation-delay: 0s; }
        .particle-2 { top: 250px; left: 500px; animation-delay: 2s; }
        .particle-3 { top: 400px; left: 300px; animation-delay: 4s; }
        .particle-4 { bottom: 150px; right: 250px; animation-delay: 1s; }
        .particle-5 { bottom: 300px; left: 500px; animation-delay: 3s; }

        /* Title */
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: titleGlow 4s ease-in-out infinite;
        }

        /* Animations */
        @keyframes rotateHex {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseDiamond {
            0%, 100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.2); }
        }

        @keyframes triangleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        @keyframes spinCircle {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }

        @keyframes squareWobble {
            0%, 100% { transform: rotate(15deg) scale(1); }
            25% { transform: rotate(25deg) scale(1.1); }
            75% { transform: rotate(5deg) scale(0.9); }
        }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.5; 
                transform: scale(1);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.5);
            }
        }

        @keyframes lineSlide {
            0% { transform: translateX(-50px) rotate(var(--rotate, 0deg)); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(50px) rotate(var(--rotate, 0deg)); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 0.8;
            }
            50% { 
                transform: translateY(-20px) scale(1.2); 
                opacity: 1;
            }
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
                color: #ffffff;
            }
            50% { 
                text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
                color: #00ffff;
            }
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 60%,
                rgba(0, 0, 0, 0.3) 100%
            );
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="artwork">
        <div class="grid-bg"></div>
        
        <div class="title">Abstract Geometry</div>
        
        <!-- Large Shapes -->
        <div class="shape-large hexagon"></div>
        <div class="shape-large diamond"></div>
        <div class="shape-large triangle-large"></div>
        
        <!-- Medium Shapes -->
        <div class="shape-medium circle-1"></div>
        <div class="shape-medium circle-2"></div>
        <div class="shape-medium square-1"></div>
        
        <!-- Small Decorative Elements -->
        <div class="shape-small dot dot-1"></div>
        <div class="shape-small dot dot-2"></div>
        <div class="shape-small dot dot-3"></div>
        <div class="shape-small dot dot-4"></div>
        <div class="shape-small dot dot-5"></div>
        
        <div class="shape-small line line-1"></div>
        <div class="shape-small line line-2"></div>
        
        <!-- Floating Particles -->
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
        <div class="particle particle-5"></div>
        
        <div class="gradient-overlay"></div>
    </div>
</body>
</html>
